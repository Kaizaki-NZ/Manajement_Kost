<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kost Finance — Riwayat transaksi keuangan kost lengkap dengan filter dan pencarian.">
  <title>Kost Finance — Riwayat Transaksi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">

    <!-- Sidebar (Desktop) -->
    <aside class="sidebar">
      <div class="sidebar__logo">Kost Finance</div>
      <nav class="sidebar__nav">
        <a href="index.html" class="sidebar__item" id="side-dashboard">
          <span class="sidebar__item-icon">🏠</span>
          Dashboard
        </a>
        <a href="tambah.html" class="sidebar__item" id="side-tambah">
          <span class="sidebar__item-icon">➕</span>
          Tambah Transaksi
        </a>
        <a href="riwayat.html" class="sidebar__item active" id="side-riwayat">
          <span class="sidebar__item-icon">📋</span>
          Riwayat
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="page-content">

      <!-- Header -->
      <header class="page-header animate-in">
        <div>
          <a href="index.html" class="page-header__back">← Kembali</a>
          <h1 class="page-header__title" style="margin-top: 0;">Riwayat Transaksi</h1>
        </div>
        <button class="btn btn--export" id="btn-export" title="Ekspor ke CSV">
          📥 Ekspor CSV
        </button>
      </header>

      <!-- Filter Bar -->
      <div class="filter-bar animate-in animate-in-delay-1" id="filter-bar">
        <button class="filter-chip active" data-filter="all">Semua</button>
        <button class="filter-chip" data-filter="income">↑ Pemasukan</button>
        <button class="filter-chip" data-filter="expense">↓ Pengeluaran</button>
      </div>

      <!-- Search -->
      <div class="search-bar animate-in animate-in-delay-2">
        <span class="search-bar__icon">🔍</span>
        <input
          type="text"
          id="search-input"
          class="search-bar__input"
          placeholder="Cari transaksi..."
        >
      </div>

      <!-- Transaction List -->
      <div id="transaction-list" class="animate-in animate-in-delay-3">
        <!-- Populated by JS -->
      </div>

    </main>

    <!-- Bottom Nav (Mobile) -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item" id="nav-dashboard">
        <span class="nav-item__icon">🏠</span>
        <span class="nav-item__label">Beranda</span>
      </a>
      <a href="tambah.html" class="nav-item nav-item--add" id="nav-tambah">
        <span class="nav-item__icon">+</span>
        <span class="nav-item__label">Tambah</span>
      </a>
      <a href="riwayat.html" class="nav-item active" id="nav-riwayat">
        <span class="nav-item__icon">📋</span>
        <span class="nav-item__label">Riwayat</span>
      </a>
    </nav>

  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/riwayat.js"></script>
</body>
</html>
