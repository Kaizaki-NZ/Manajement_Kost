<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kost Finance — Masuk atau daftar untuk mencatat keuangan kost.">
  <title>Kost Finance — Autentikasi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-primary);">
  <div class="app-container" style="max-width: 400px; padding: var(--space-xl);">
    
    <div style="text-align: center; margin-bottom: var(--space-xl);">
      <h1 class="page-header__title" style="margin-top: 0;">Kost Finance</h1>
      <p style="color: var(--text-secondary); margin-top: var(--space-sm);">Sistem Manajemen Keuangan Kost</p>
    </div>

    <!-- Login Form -->
    <form id="auth-form" autocomplete="off">
      <div id="register-fields" style="display: none;">
        <div class="form-group">
          <label class="form-label" for="input-name">Nama Lengkap</label>
          <input type="text" id="input-name" class="form-input" placeholder="Misal: Budi Santoso">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="input-email">Email</label>
        <input type="email" id="input-email" class="form-input" placeholder="email@contoh.com" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="input-password">Kata Sandi</label>
        <input type="password" id="input-password" class="form-input" placeholder="Minimal 8 karakter" required>
      </div>

      <button type="submit" class="btn btn--primary" id="btn-submit" style="width: 100%;">
        Masuk
      </button>

      <p style="text-align: center; margin-top: var(--space-lg); color: var(--text-secondary); font-size: var(--font-sm);">
        <span id="toggle-text">Belum punya akun?</span> 
        <a href="#" id="btn-toggle-mode" style="color: var(--accent-income); font-weight: 600; text-decoration: none;">Daftar di sini</a>
      </p>
    </form>

  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
